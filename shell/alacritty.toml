# ~/.config/alacritty/alacritty.toml

[window]
dimensions = { columns = 140, lines = 40 }
dynamic_padding = true
padding = { x = 12, y = 12 }
option_as_alt = "Both"
startup_mode = "Windowed"

[scrolling]
history = 32768                     # scrollback lines
multiplier = 3

[font]
size = 14.0                         # adjust to taste (13–16 common on Retina)

normal = {family = "JetBrainsMono Nerd Font", style = "Regular"}
bold   = {family = "JetBrainsMono Nerd Font", style = "Bold"}
italic = {family = "JetBrainsMono Nerd Font", style = "Italic"}
bold_italic = {family = "JetBrainsMono Nerd Font", style = "Bold Italic"}

# Fallback for emojis/symbols (optional but nice)
# [font.glyph_offset]   # tweak if glyphs are misaligned
# x = 0
# y = 1

# Selection
[selection]
save_to_clipboard = true

# catppuccin_machiato
[colors]
draw_bold_text_with_bright_colors = true

# Default colors
[colors.primary]
background = '#24273A' # base
foreground = '#CAD3F5' # text
# Bright and dim foreground colors
dim_foreground = '#CAD3F5' # text
bright_foreground = '#CAD3F5' # text

# Cursor colors
[colors.cursor]
text = '#24273A' # base
cursor = '#F4DBD6' # rosewater

[colors.vi_mode_cursor]
text = '#24273A' # base
cursor = '#B7BDF8' # lavender

# Search colors
[colors.search.matches]
foreground = '#24273A' # base
background = '#A5ADCB' # subtext0

[colors.search.focused_match]
foreground = '#24273A' # base
background = '#A6DA95' # green

[colors.footer_bar]
foreground = '#24273A' # base
background = '#A5ADCB' # subtext0

# Keyboard regex hints
[colors.hints.start]
foreground = '#24273A' # base
background = '#EED49F' # yellow

[colors.hints.end]
foreground = '#24273A' # base
background = '#A5ADCB' # subtext0

# Selection colors
[colors.selection]
text = '#24273A' # base
background = '#F4DBD6' # rosewater

# Normal colors
[colors.normal]
black = '#494D64' # surface1
red = '#ED8796' # red
green = '#A6DA95' # green
yellow = '#EED49F' # yellow
blue = '#8AADF4' # blue
magenta = '#F5BDE6' # pink
cyan = '#8BD5CA' # teal
white = '#B8C0E0' # subtext1

# Bright colors
[colors.bright]
black = '#5B6078' # surface2
red = '#ED8796' # red
green = '#A6DA95' # green
yellow = '#EED49F' # yellow
blue = '#8AADF4' # blue
magenta = '#F5BDE6' # pink
cyan = '#8BD5CA' # teal
white = '#A5ADCB' # subtext0

# Dim colors
[colors.dim]
black = '#494D64' # surface1
red = '#ED8796' # red
green = '#A6DA95' # green
yellow = '#EED49F' # yellow
blue = '#8AADF4' # blue
magenta = '#F5BDE6' # pink
cyan = '#8BD5CA' # teal
white = '#B8C0E0' # subtext1
